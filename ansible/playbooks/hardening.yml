---
# OS hardening: SSH hardening, UFW firewall, and system updates
- name: Harden server
  hosts: server
  become: true

  tasks:
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        cache_valid_time: 3600
      tags: [hardening, packages]

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
        validate: /usr/sbin/sshd -t -f %s
      notify: Restart sshd
      tags: [hardening, ssh]

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
        validate: /usr/sbin/sshd -t -f %s
      notify: Restart sshd
      tags: [hardening, ssh]

    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true
        cache_valid_time: 3600
      tags: [hardening, ufw]

    - name: Set UFW default incoming policy to deny
      community.general.ufw:
        default: deny
        direction: incoming
      tags: [hardening, ufw]

    - name: Set UFW default outgoing policy to allow
      community.general.ufw:
        default: allow
        direction: outgoing
      tags: [hardening, ufw]

    - name: Allow SSH (port 22)
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
        comment: SSH
      tags: [hardening, ufw]

    - name: Allow k3s API server (port 6443)
      community.general.ufw:
        rule: allow
        port: '6443'
        proto: tcp
        comment: k3s API server
      tags: [hardening, ufw]

    - name: Allow HTTP (port 80)
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp
        comment: HTTP
      tags: [hardening, ufw]

    - name: Allow HTTPS (port 443)
      community.general.ufw:
        rule: allow
        port: '443'
        proto: tcp
        comment: HTTPS
      tags: [hardening, ufw]

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      tags: [hardening, ufw]

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted
